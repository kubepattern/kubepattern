name: Build Docker Image

on:
  push:
    branches:
      - dev
    tags:
      - 'app/v*-rc'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Image Tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Se hai pushato un tag (es. app/v0.0.1-rc), estraiamo "0.0.1-rc"
            VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/app/v,,')
            echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV
          else
            # Se hai pushato normalmente sul branch dev
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Build and Push
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/kubepattern"
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          echo "Building image $IMAGE_ID:${{ env.IMAGE_TAG }}..."
          
          # Build the Docker image
          docker build -t $IMAGE_ID:${{ env.IMAGE_TAG }} .
          
          # Push the Docker image to GitHub Packages
          docker push $IMAGE_ID:${{ env.IMAGE_TAG }}