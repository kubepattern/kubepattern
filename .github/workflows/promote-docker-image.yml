name: Promote Docker Image

on:
  push:
    tags:
      - 'app/v*'

jobs:
  promote:
    if: ${{ !endsWith(github.ref, '-rc') }}
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag RC to Stable
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/kubepattern"
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          # from app/vX.Y.Z to X.Y.Z
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/app/v,,')
          
          # Build release candidate tag
          RC_TAG="${VERSION}-rc"
          
          echo "Promote tested image ($RC_TAG) to stable ($VERSION)"
          
          # 1. Discard RC tag
          docker pull $IMAGE_ID:$RC_TAG
          
          # 2. Promote RC to Stable
          docker tag $IMAGE_ID:$RC_TAG $IMAGE_ID:$VERSION
          docker tag $IMAGE_ID:$RC_TAG $IMAGE_ID:latest
          
          # 3. Push stable tag
          docker push $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:latest