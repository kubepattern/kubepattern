apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-clusterrole
rules:
  # 1. Rules required to analyze all cluster resources
{{ toYaml .Values.rbac.rules | nindent 2 }}

  # 2. Rules required to create and manage the Smells CRD generated by the analysis
  - apiGroups: ["kubepattern.dev"]
    resources: ["smells"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]